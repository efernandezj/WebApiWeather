
version: '3.8'
services:
  weatherapi:
    build:
      context: .
      dockerfile: WeatherApp.Api/Dockerfile
    container_name: weatherapi
    ports:
      - "5000:80"
    depends_on:
      - mongodb
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
